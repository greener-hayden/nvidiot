name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install PyInstaller
        run: pip install "pyinstaller>=6.0"

      - name: Build exe
        run: pyinstaller --onefile --noconsole --name nvidiot main.py

      - name: Rename artifact
        run: mv dist/nvidiot.exe "dist/nvidiot-${{ github.ref_name }}.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/nvidiot-${{ github.ref_name }}.exe
