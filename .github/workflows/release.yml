name: Release

on:
  push:
    branches: [main]
    paths: [pyproject.toml]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Read version and check for existing tag
        id: check
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml)
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $TAG already exists — skipping release."
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.skip != 'true'
        with:
          python-version: "3.13"

      - name: Install PyInstaller
        if: steps.check.outputs.skip != 'true'
        run: pip install "pyinstaller>=6.0"

      - name: Build exe
        if: steps.check.outputs.skip != 'true'
        run: pyinstaller --onefile --noconsole --name nvidiot main.py

      - name: Rename artifact and generate checksum
        if: steps.check.outputs.skip != 'true'
        run: |
          TAG="${{ steps.check.outputs.tag }}"
          mv dist/nvidiot.exe "dist/nvidiot-${TAG}.exe"
          cd dist
          sha256sum "nvidiot-${TAG}.exe" > "nvidiot-${TAG}.exe.sha256"

      - name: Create tag
        if: steps.check.outputs.skip != 'true'
        run: |
          git tag "${{ steps.check.outputs.tag }}"
          git push origin "${{ steps.check.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/nvidiot-${{ steps.check.outputs.tag }}.exe
            dist/nvidiot-${{ steps.check.outputs.tag }}.exe.sha256
