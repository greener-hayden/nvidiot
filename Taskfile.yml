version: "3"

vars:
  VENV_DIR: .venv
  PYTHON: "{{.VENV_DIR}}/Scripts/python"
  PIP: "{{.VENV_DIR}}/Scripts/pip"

tasks:
  venv:
    desc: Create venv and install dependencies if needed
    internal: true
    cmds:
      - python -m venv {{.VENV_DIR}}
      - "{{.PYTHON}} -m pip install --upgrade pip setuptools"
      - "{{.PIP}} install -e .[dev]"
    status:
      - test -d {{.VENV_DIR}}
      - "{{.PIP}} show pytest"

  dev:
    desc: Run the API server
    deps: [venv]
    cmds:
      - "{{.PYTHON}} main.py"

  build:
    desc: Build standalone .exe with PyInstaller
    deps: [venv]
    cmds:
      - "{{.VENV_DIR}}/Scripts/pyinstaller --onefile --noconsole --name nvidiot main.py"

  install:
    desc: Build, install, and register as a scheduled task (requires admin)
    deps: [build]
    cmds:
      - dist/nvidiot.exe install

  uninstall:
    desc: Stop nvidiot and remove the scheduled task
    cmds:
      - dist/nvidiot.exe uninstall

  release:
    desc: "Bump version and push (workflow creates tag + release) — usage: task release -- 0.2.0"
    cmds:
      - |
        VERSION="{{.CLI_ARGS}}"
        if [ -z "$VERSION" ]; then
          echo "Usage: task release -- <version>  (e.g. task release -- 0.2.0)"
          exit 1
        fi
        case "$VERSION" in
          [0-9]*.[0-9]*.[0-9]*) ;;
          *) echo "Error: version must be in X.Y.Z format (got: $VERSION)"; exit 1 ;;
        esac
        powershell -NoProfile -Command \
          "(Get-Content pyproject.toml -Raw) -replace 'version = \".*?\"', 'version = \"$VERSION\"' | Set-Content -NoNewline pyproject.toml"
        git add pyproject.toml
        git commit -m "Bump version to $VERSION"
        git push origin main
